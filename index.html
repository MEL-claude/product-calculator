<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>з”ўе“Ғе–®дҪҚжҸӣз®—иЁҲз®—ж©ҹ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans TC',sans-serif;
    background:#f5f4f0;
    color:#2c2c2a;
    min-height:100vh;
    padding:24px 16px;
  }
  h1{
    font-size:15px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#888780;
    margin-bottom:20px;
  }
  .card{
    background:#fff;
    border:1px solid #e0dfd8;
    border-radius:12px;
    padding:16px 20px;
    margin-bottom:12px;
  }
  .section-title{
    font-size:11px;
    font-weight:600;
    color:#b4b2a9;
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:14px;
  }
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .row:last-child{margin-bottom:0}
  label{
    font-size:13px;
    color:#5f5e5a;
    min-width:100px;
    flex-shrink:0;
  }
  input[type=number]{
    flex:1;
    min-width:0;
    padding:8px 10px;
    border:1px solid #e0dfd8;
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    color:#2c2c2a;
    background:#faf9f7;
    outline:none;
    transition:border-color .15s;
  }
  input[type=number]:focus{border-color:#888780}
  input.big{font-size:20px;font-weight:600;padding:10px 12px}
  .unit{font-size:12px;color:#b4b2a9;white-space:nowrap;min-width:50px}
  .pallet-hint{
    font-size:12px;
    color:#b4b2a9;
    padding-left:110px;
    margin-top:-4px;
    margin-bottom:10px;
  }
  .tab-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .tab{
    flex:1;
    min-width:120px;
    padding:9px 8px;
    font-size:13px;
    font-family:inherit;
    border:1px solid #e0dfd8;
    border-radius:8px;
    background:#f5f4f0;
    color:#888780;
    cursor:pointer;
    text-align:center;
    transition:all .15s;
  }
  .tab.active{
    background:#fff;
    color:#2c2c2a;
    border-color:#888780;
    font-weight:600;
  }
  .tab:hover:not(.active){background:#ebe9e3}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
  @media(max-width:500px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .metric{
    background:#f5f4f0;
    border-radius:10px;
    padding:12px 10px;
  }
  .metric.accent{
    background:#f0efe8;
    border:1px solid #d3d1c7;
  }
  .metric-label{font-size:11px;color:#888780;margin-bottom:5px}
  .metric-val{font-size:18px;font-weight:700;color:#2c2c2a;line-height:1.2}
  .metric-sub{font-size:10px;color:#b4b2a9;margin-top:3px}
  .flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .flow-box{
    background:#f5f4f0;
    border-radius:8px;
    padding:7px 12px;
    text-align:center;
    min-width:68px;
  }
  .flow-box.psd-box{border:1px solid #d3d1c7;background:#f0efe8}
  .flow-box strong{display:block;font-size:15px;font-weight:700;color:#2c2c2a}
  .flow-box span{font-size:10px;color:#888780}
  .arrow{color:#d3d1c7;font-size:14px}
  .detail{
    font-size:13px;
    color:#5f5e5a;
    background:#f5f4f0;
    border-radius:8px;
    padding:10px 14px;
    line-height:1.9;
    margin-bottom:12px;
  }
  .detail b{color:#2c2c2a}
  hr{border:none;border-top:1px solid #f0efe8;margin:12px 0}
  .reset-btn{
    font-size:12px;
    color:#888780;
    background:none;
    border:1px solid #e0dfd8;
    border-radius:8px;
    padding:6px 14px;
    cursor:pointer;
    font-family:inherit;
    transition:background .15s;
  }
  .reset-btn:hover{background:#f5f4f0}
</style>
</head>
<body>

<h1>з”ўе“Ғе–®дҪҚжҸӣз®—</h1>

<!-- иҰҸж јиЁӯе®ҡ -->
<div class="card">
  <div class="section-title">з”ўе“ҒиҰҸж јиЁӯе®ҡ</div>
  <div class="row">
    <label>1 PSD</label>
    <input type="number" id="psdBase" value="4500" min="1" step="1">
    <span class="unit">з“¶</span>
  </div>
  <div class="row">
    <label>жҜҸз®ұе…Ҙж•ё</label>
    <input type="number" id="perBox" value="24" min="1" step="1">
    <span class="unit">з“¶пјҸз®ұ</span>
  </div>
  <div class="row" style="margin-bottom:4px">
    <label>жҜҸжЈ§жқҝ</label>
    <input type="number" id="boxPerLayer" value="10" min="1" step="1" style="max-width:80px;flex:none">
    <span class="unit">з®ұпјҸеұӨгҖҖГ—</span>
    <input type="number" id="layers" value="6" min="1" step="1" style="max-width:80px;flex:none">
    <span class="unit">еұӨ</span>
  </div>
  <div class="pallet-hint">пјқ <span id="perPalletDisplay">60</span> з®ұпјҸжЈ§жқҝ</div>
</div>

<!-- жҸӣз®—ж–№еҗ‘ tabs -->
<div class="tab-row">
  <button class="tab active" id="tab-psd" onclick="setMode('psd')">рҹ“Ҡ PSD вҶ’ з“¶пјҸз®ұпјҸжЈ§жқҝ</button>
  <button class="tab" id="tab-fwd" onclick="setMode('fwd')">рҹҚ¶ з“¶ вҶ’ з®ұ вҶ’ жЈ§жқҝ</button>
  <button class="tab" id="tab-rev" onclick="setMode('rev')">рҹ“Ұ з®ұпјҸжЈ§жқҝ вҶ’ з“¶</button>
</div>

<!-- PSD ијёе…Ҙ -->
<div class="card" id="psd-input">
  <div class="section-title">ијёе…Ҙ PSD еҖҚж•ё</div>
  <div class="row">
    <label>PSD еҖҚж•ё</label>
    <input type="number" class="big" id="qty-psd" value="1" min="0" step="0.5">
    <span class="unit">PSD</span>
  </div>
</div>

<!-- жӯЈеҗ‘ијёе…Ҙ -->
<div class="card" id="fwd-input" style="display:none">
  <div class="section-title">ијёе…Ҙз“¶ж•ё</div>
  <div class="row">
    <label>з”ўе“Ғж•ёйҮҸ</label>
    <input type="number" class="big" id="qty-bottles" value="5000" min="0" step="1">
    <span class="unit">з“¶</span>
  </div>
</div>

<!-- еҸҚеҗ‘ијёе…Ҙ -->
<div class="card" id="rev-input" style="display:none">
  <div class="section-title">ијёе…Ҙж•ёйҮҸпјҲеҸҜеҗҢжҷӮеЎ«еҜ«пјү</div>
  <div class="row">
    <label>жЈ§жқҝж•ё</label>
    <input type="number" class="big" id="qty-pallets" value="0" min="0" step="1">
    <span class="unit">еҖӢжЈ§жқҝ</span>
  </div>
  <div class="row">
    <label>еҠ дёҠж•Јз®ұ</label>
    <input type="number" class="big" id="qty-boxes" value="0" min="0" step="1">
    <span class="unit">з®ұ</span>
  </div>
</div>

<!-- зөҗжһң -->
<div class="metrics" id="metrics-area"></div>

<div class="card">
  <div class="section-title">жҸӣз®—жөҒзЁӢ</div>
  <div class="flow" id="flow-area"></div>
  <div class="detail" id="detail-area"></div>
  <hr>
  <button class="reset-btn" onclick="reset()">вҶә йҮҚиЁӯ</button>
</div>

<script>
let mode='psd';

function setMode(m){
  mode=m;
  ['psd','fwd','rev'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab'+(m===t?' active':'');
    document.getElementById(t+'-input').style.display=m===t?'':'none';
  });
  calc();
}

function metric(label,val,sub,accent){
  return'<div class="metric'+(accent?' accent':'')+'">'+
    '<div class="metric-label">'+label+'</div>'+
    '<div class="metric-val">'+val+'</div>'+
    '<div class="metric-sub">'+sub+'</div>'+
  '</div>';
}
function flowBox(val,label,cls){
  return'<div class="flow-box'+(cls?' '+cls:'')+'">'+
    '<strong>'+val+'</strong><span>'+label+'</span>'+
  '</div>';
}

function calc(){
  const psdBase=Math.max(1,parseFloat(document.getElementById('psdBase').value)||4500);
  const perBox=Math.max(1,parseInt(document.getElementById('perBox').value)||1);
  const boxPerLayer=Math.max(1,parseInt(document.getElementById('boxPerLayer').value)||1);
  const layerCount=Math.max(1,parseInt(document.getElementById('layers').value)||1);
  const perPallet=boxPerLayer*layerCount;
  document.getElementById('perPalletDisplay').textContent=perPallet;

  if(mode==='psd'){
    const psdMul=parseFloat(document.getElementById('qty-psd').value)||0;
    const qty=Math.round(psdMul*psdBase);
    const totalBoxes=Math.ceil(qty/perBox);
    const fullBoxes=Math.floor(qty/perBox);
    const remBottles=qty%perBox;
    const totalPallets=Math.ceil(totalBoxes/perPallet);
    const fullPallets=Math.floor(totalBoxes/perPallet);
    const remBoxes=totalBoxes%perPallet;
    const looseSub=remBoxes>0?'жң«жЈ§жқҝзҙ„'+Math.ceil(remBoxes/boxPerLayer)+'еұӨ':(remBottles>0?'дёҚи¶і1з®ұ':'е…Ёж•ҙжЈ§жқҝ');
    const looseVal=(remBoxes>0&&remBottles>0)?remBoxes+'з®ұ+'+remBottles+'з“¶':remBoxes>0?remBoxes+'з®ұ':remBottles>0?remBottles+'з“¶':'з„Ў';

    document.getElementById('metrics-area').innerHTML=
      metric('PSD еҖҚж•ё',psdMul+' PSD','пјқ '+qty.toLocaleString()+' з“¶',true)+
      metric('йңҖиҰҒзҡ„з®ұж•ё',totalBoxes.toLocaleString()+'з®ұ',remBottles>0?'ж•ЈйӨҳ'+remBottles+'з“¶':'ж•ҙз®ұ')+
      metric('йңҖиҰҒзҡ„жЈ§жқҝж•ё',totalPallets.toLocaleString()+'еҖӢ',remBoxes>0?'жң«жЈ§жқҝ'+remBoxes+'з®ұ':'ж•ҙжЈ§жқҝ')+
      metric('жң«жЈ§жқҝжҳҺзҙ°',looseVal,looseSub);

    document.getElementById('flow-area').innerHTML=
      flowBox(psdMul,'PSD','psd-box')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(qty.toLocaleString(),'з“¶')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(totalBoxes.toLocaleString(),'з®ұпјҲеҗ«ж•Јпјү')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(totalPallets.toLocaleString(),'жЈ§жқҝпјҲеҗ«ж•Јпјү');

    let d=psdMul+' PSD Г— '+psdBase.toLocaleString()+' = <b>'+qty.toLocaleString()+' з“¶</b><br>';
    d+=qty.toLocaleString()+' Г· '+perBox+' = '+fullBoxes+' ж•ҙз®ұ';
    if(remBottles>0) d+=' + ж•ЈиЈқ'+remBottles+'з“¶пјҲиЁҲ1з®ұпјү';
    d+='пјҢе…ұ <b>'+totalBoxes+' з®ұ</b><br>';
    d+=totalBoxes+' Г· '+perPallet+'пјҲ'+boxPerLayer+'Г—'+layerCount+'еұӨпјү= '+fullPallets+' ж•ҙжЈ§жқҝ';
    if(remBoxes>0) d+=' + жң«жЈ§жқҝ'+remBoxes+'з®ұ';
    d+='пјҢе…ұйңҖ <b>'+totalPallets+' жЈ§жқҝ</b>';
    document.getElementById('detail-area').innerHTML=d;

  } else if(mode==='fwd'){
    const qty=parseInt(document.getElementById('qty-bottles').value)||0;
    const psdVal=(qty/psdBase).toFixed(2);
    const totalBoxes=Math.ceil(qty/perBox);
    const fullBoxes=Math.floor(qty/perBox);
    const remBottles=qty%perBox;
    const totalPallets=Math.ceil(totalBoxes/perPallet);
    const fullPallets=Math.floor(totalBoxes/perPallet);
    const remBoxes=totalBoxes%perPallet;
    const looseVal=(remBoxes>0&&remBottles>0)?remBoxes+'з®ұ+'+remBottles+'з“¶':remBoxes>0?remBoxes+'з®ұ':remBottles>0?remBottles+'з“¶':'з„Ў';

    document.getElementById('metrics-area').innerHTML=
      metric('жҸӣз®— PSD',psdVal+' PSD','пјқ '+qty.toLocaleString()+' з“¶',true)+
      metric('йңҖиҰҒзҡ„з®ұж•ё',totalBoxes.toLocaleString()+'з®ұ',remBottles>0?'ж•ЈйӨҳ'+remBottles+'з“¶':'ж•ҙз®ұ')+
      metric('йңҖиҰҒзҡ„жЈ§жқҝж•ё',totalPallets.toLocaleString()+'еҖӢ',remBoxes>0?'жң«жЈ§жқҝ'+remBoxes+'з®ұ':'ж•ҙжЈ§жқҝ')+
      metric('жң«жЈ§жқҝжҳҺзҙ°',looseVal,remBoxes>0?'жң«жЈ§жқҝзҙ„'+Math.ceil(remBoxes/boxPerLayer)+'еұӨ':'е…Ёж•ҙжЈ§жқҝ');

    document.getElementById('flow-area').innerHTML=
      flowBox(qty.toLocaleString(),'з“¶')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(psdVal,'PSD','psd-box')+
      '<span class="arrow"> | </span>'+
      flowBox(totalBoxes.toLocaleString(),'з®ұпјҲеҗ«ж•Јпјү')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(totalPallets.toLocaleString(),'жЈ§жқҝпјҲеҗ«ж•Јпјү');

    let d=qty.toLocaleString()+' з“¶ Г· '+psdBase.toLocaleString()+' = <b>'+psdVal+' PSD</b><br>';
    d+=qty.toLocaleString()+' Г· '+perBox+' = '+fullBoxes+' ж•ҙз®ұ';
    if(remBottles>0) d+=' + ж•ЈиЈқ'+remBottles+'з“¶пјҲиЁҲ1з®ұпјү';
    d+='пјҢе…ұ <b>'+totalBoxes+' з®ұ</b><br>';
    d+=totalBoxes+' Г· '+perPallet+'пјҲ'+boxPerLayer+'Г—'+layerCount+'еұӨпјү= '+fullPallets+' ж•ҙжЈ§жқҝ';
    if(remBoxes>0) d+=' + жң«жЈ§жқҝ'+remBoxes+'з®ұ';
    d+='пјҢе…ұйңҖ <b>'+totalPallets+' жЈ§жқҝ</b>';
    document.getElementById('detail-area').innerHTML=d;

  } else {
    const pallets=parseInt(document.getElementById('qty-pallets').value)||0;
    const extraBoxes=parseInt(document.getElementById('qty-boxes').value)||0;
    const totalBoxes=pallets*perPallet+extraBoxes;
    const totalBottles=totalBoxes*perBox;
    const psdVal=(totalBottles/psdBase).toFixed(2);

    document.getElementById('metrics-area').innerHTML=
      metric('жҸӣз®— PSD',psdVal+' PSD','пјқ '+totalBottles.toLocaleString()+' з“¶',true)+
      metric('зёҪз®ұж•ё',totalBoxes.toLocaleString()+'з®ұ',pallets+'жЈ§жқҝ+'+extraBoxes+'ж•Јз®ұ')+
      metric('зёҪз“¶ж•ё',totalBottles.toLocaleString()+'з“¶','ж•ҙз®ұиЁҲз®—')+
      metric('жЈ§жқҝжҳҺзҙ°',pallets+'жқҝ + '+extraBoxes+'з®ұ','е·Іијёе…Ҙж•ёйҮҸ');

    document.getElementById('flow-area').innerHTML=
      flowBox(pallets.toLocaleString(),'жЈ§жқҝ')+
      (extraBoxes>0?'<span class="arrow">+</span>'+flowBox(extraBoxes.toLocaleString(),'ж•Јз®ұ'):'')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(totalBoxes.toLocaleString(),'з®ұ')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(totalBottles.toLocaleString(),'з“¶')+
      '<span class="arrow">вҶ’</span>'+
      flowBox(psdVal,'PSD','psd-box');

    let d=pallets+' жЈ§жқҝ Г— '+perPallet+'пјҲ'+boxPerLayer+'Г—'+layerCount+'еұӨпјү= '+(pallets*perPallet).toLocaleString()+' з®ұ';
    if(extraBoxes>0) d+=' + '+extraBoxes+' ж•Јз®ұ = <b>'+totalBoxes.toLocaleString()+' з®ұ</b>';
    d+='<br>'+totalBoxes.toLocaleString()+' з®ұ Г— '+perBox+' = <b>'+totalBottles.toLocaleString()+' з“¶</b>';
    d+='<br>'+totalBottles.toLocaleString()+' Г· '+psdBase.toLocaleString()+' = <b>'+psdVal+' PSD</b>';
    document.getElementById('detail-area').innerHTML=d;
  }
}

function reset(){
  document.getElementById('psdBase').value=4500;
  document.getElementById('perBox').value=24;
  document.getElementById('boxPerLayer').value=10;
  document.getElementById('layers').value=6;
  document.getElementById('qty-psd').value=1;
  document.getElementById('qty-bottles').value=5000;
  document.getElementById('qty-pallets').value=0;
  document.getElementById('qty-boxes').value=0;
  calc();
}

['psdBase','perBox','boxPerLayer','layers','qty-psd','qty-bottles','qty-pallets','qty-boxes'].forEach(function(id){
  document.getElementById(id).addEventListener('input',calc);
});
calc();
</script>
</body>
</html>
